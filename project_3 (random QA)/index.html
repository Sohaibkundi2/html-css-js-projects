<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randum Question Answer Genrator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background">
        <div class="card">
            <div class="card_content">
                <h2>Your Score is : <span id="scoreUpdate">0</span></h2>

        </div>
        <div id="footerUpr" class="footer-upr hide"> Greate, You Guessed it Right</div>
        <div id="footerLwr" class="footer-lwr hide"> Oops try Again ,Best of Luck</div>
    </div>
    </div>
