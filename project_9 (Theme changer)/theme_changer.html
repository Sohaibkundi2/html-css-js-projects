<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme chager website</title>
    <link rel="stylesheet" href="theme_changer.css">
</head>
<body>
    <h2>Click Below to Change the Theme</h2>
    <button class="button" id="red" onclick="bgcolor('red')">Red</button>
    <button class="button" id="green" onclick="bgcolor('green')">Green</button>
    <button class="button" id="blue" onclick="bgcolor('blue')">Blue</button>
    <button class="button" id="black" onclick="bgcolor('Black')">Black</button>
    <button class="button"onclick="randcolor()" >Random</button>
    <script src="theme_changer.js"></script>
</body>
</html>
